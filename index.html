<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#EEF2F9">
<meta property="og:title" content="LiverAPP - Patient Health Tracker">
<meta property="og:description" content="Liver & Health Tracker">
<title>LiverAPP</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ══ LIGHT ══ */
body.light{
--bg:#EDF1F8;--bg2:#E0E6F0;--card:#FFFFFF;--card2:#F3F6FB;
--text:#0A0F1F;--text2:#1E2A45;--muted:#4A5568;--muted2:#718096;
--border:rgba(0,0,0,.08);--bdr2:rgba(0,0,0,.13);
--accent:#B83B3B;--accent2:#D45A5A;--abg:rgba(184,59,59,.09);
--green:#1D7A4A;--gbg:rgba(29,122,74,.09);
--red:#C03030;--rbg:rgba(192,48,48,.09);
--amber:#A06B00;--ambg:rgba(160,107,0,.09);
--rose:#A83D68;--robg:rgba(168,61,104,.09);
--sidebar:#0A0F1F;
--shadow:0 1px 3px rgba(0,0,0,.05),0 6px 24px rgba(0,0,0,.06);
--shw2:0 2px 16px rgba(0,0,0,.1);
--inp:#EDF1F8;--inpb:#C5CFDF;
}
/* ══ DARK ══ */
body.dark{
--bg:#0B111E;--bg2:#111929;--card:#161E30;--card2:#1C2640;
--text:#F0F2F8;--text2:#C5CBE0;--muted:#8A94B0;--muted2:#5A6580;
--border:rgba(255,255,255,.07);--bdr2:rgba(255,255,255,.12);
--accent:#E87B7B;--accent2:#F096A0;--abg:rgba(232,123,123,.12);
--green:#5CCB8D;--gbg:rgba(92,203,141,.1);
--red:#F08080;--rbg:rgba(240,128,128,.1);
--amber:#F5D060;--ambg:rgba(245,208,96,.1);
--rose:#F090B8;--robg:rgba(240,144,184,.1);
--sidebar:#070C17;
--shadow:0 1px 3px rgba(0,0,0,.25),0 6px 24px rgba(0,0,0,.3);
--shw2:0 2px 16px rgba(0,0,0,.35);
--inp:rgba(255,255,255,.06);--inpb:rgba(255,255,255,.12);
}

body{
font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);font-size:15px;
overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background .4s,color .3s;
}

/* Organic background blobs */
body::before{content:'';position:fixed;width:500px;height:500px;border-radius:50%;
background:var(--accent);opacity:.035;filter:blur(100px);top:-120px;right:-80px;pointer-events:none;z-index:0;
animation:float1 25s ease-in-out infinite}
body::after{content:'';position:fixed;width:400px;height:400px;border-radius:50%;
background:var(--rose);opacity:.03;filter:blur(100px);bottom:-100px;left:-60px;pointer-events:none;z-index:0;
animation:float1 30s ease-in-out infinite reverse}
@keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,20px)}}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:10px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes softPop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}

/* ══ SIDEBAR ══ */
.sb{position:fixed;left:0;top:0;bottom:0;width:244px;background:var(--sidebar);
display:flex;flex-direction:column;z-index:100;transition:transform .35s cubic-bezier(.4,0,.2,1);
border-right:1px solid rgba(255,255,255,.04)}

.sb-top{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{display:flex;align-items:center;gap:11px}
.sb-icon{width:40px;height:40px;border-radius:50%;background:linear-gradient(140deg,#B83B3B,#D45A5A);
display:flex;align-items:center;justify-content:center;font-size:19px;
box-shadow:0 4px 14px rgba(79,109,196,.25)}
.sb-top h1{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.3px;line-height:1.2}
.sb-top small{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:1.2px;text-transform:uppercase;font-weight:700}

.sb-prof{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-pbtn{width:100%;display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:14px;
border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);cursor:pointer;
color:#fff;font:600 13px/1.3 'Nunito',sans-serif;text-align:left;transition:background .2s}
.sb-pbtn:hover{background:rgba(255,255,255,.07)}
.sb-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(140deg,#B83B3B,#D45A5A);
display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}

.sb nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:2px}
.nv{display:flex;align-items:center;gap:12px;padding:11px 16px;border-radius:14px;border:none;
cursor:pointer;font:700 14px/1 'Nunito',sans-serif;background:transparent;
color:rgba(255,255,255,.42);transition:all .25s;text-align:left;width:100%}
.nv:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.65)}
.nv.on{background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(184,59,59,.3)}
.nv .ic{font-size:19px;width:24px;text-align:center}

.sb-ft{padding:12px 14px;border-top:1px solid rgba(255,255,255,.06)}
.thb{width:100%;display:flex;align-items:center;justify-content:space-between;padding:9px 13px;
border-radius:12px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);
cursor:pointer;color:rgba(255,255,255,.4);font:600 12px 'Nunito',sans-serif;transition:all .2s}
.thb:hover{background:rgba(255,255,255,.06)}
.tg{width:36px;height:20px;border-radius:10px;background:rgba(255,255,255,.1);position:relative;transition:background .3s}
.tg.on{background:var(--accent)}
.tgk{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;
transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 4px rgba(0,0,0,.15)}
.tg.on .tgk{transform:translateX(16px)}

/* ══ MOBILE ══ */
.mh{display:none;position:fixed;top:0;left:0;right:0;height:56px;
background:var(--card);border-bottom:1px solid var(--border);z-index:90;
align-items:center;justify-content:space-between;padding:0 16px;
backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.mb{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text);padding:4px}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:99;backdrop-filter:blur(3px)}
@media(max-width:767px){
.sb{transform:translateX(-100%)}.sb.open{transform:translateX(0);box-shadow:4px 0 30px rgba(0,0,0,.25)}
.ov.open{display:block}.mh{display:flex}
}

/* ══ MAIN ══ */
.mn{margin-left:244px;padding:28px 34px;max-width:880px;position:relative;z-index:1;overflow-x:hidden}
@media(max-width:900px){.mn{padding:28px 16px}}
@media(max-width:767px){.mn{margin-left:0!important;padding:66px 14px 28px!important;max-width:100vw;overflow-x:hidden}}

/* ══ CARDS ══ */
.cd{background:var(--card);border-radius:22px;padding:24px;border:1px solid var(--border);
box-shadow:var(--shadow);margin-bottom:16px;transition:transform .2s ease;font-size:15px;overflow:hidden;max-width:100%}

/* ══ STATS ══ */
.sgs{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px}
.sg{background:var(--card);border-radius:22px;padding:22px;border:1px solid var(--border);
box-shadow:var(--shadow);cursor:pointer;transition:all .25s ease;position:relative;overflow:hidden}
.sg:hover{transform:translateY(-3px);box-shadow:var(--shw2)}
.sg:active{transform:scale(.98)}
.sg-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sg-ic{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px}
.sg-ar{font-size:16px;color:var(--muted);transition:transform .2s}
.sg:hover .sg-ar{transform:translateX(3px)}
.sg-v{font-size:34px;font-weight:900;letter-spacing:-1px;color:var(--text)}
.sg-l{font-size:14px;color:var(--text2);font-weight:600;margin-top:4px}
.sg-s{font-size:12px;font-weight:700;margin-top:8px;display:inline-block;padding:4px 12px;border-radius:20px}

/* ══ FORMS ══ */
.fl{margin-bottom:16px}
.fl label{display:block;font-size:12px;font-weight:800;color:var(--text2);margin-bottom:6px;
text-transform:uppercase;letter-spacing:.6px}
.fl input,.fl select,.fl textarea{width:100%;padding:12px 16px;border-radius:14px;
border:1.5px solid var(--inpb);background:var(--inp);color:var(--text);
font:15px/1.4 'Nunito',sans-serif;outline:none;transition:all .2s}
.fl input:focus,.fl select:focus,.fl textarea:focus{border-color:var(--accent);
box-shadow:0 0 0 3px var(--abg)}
.fl textarea{resize:vertical;min-height:60px}

/* ══ BUTTONS ══ */
.bt{padding:11px 22px;border-radius:14px;font:700 14px 'Nunito',sans-serif;
cursor:pointer;transition:all .2s;border:none;display:inline-flex;align-items:center;gap:6px}
.bp{background:var(--accent);color:#fff;box-shadow:0 3px 12px rgba(184,59,59,.25)}
.bp:hover{filter:brightness(1.06);transform:translateY(-1px)}
.b2{background:var(--inp);color:var(--text);border:1.5px solid var(--inpb)}
.b2:hover{border-color:var(--accent)}
.bt:disabled{opacity:.35;cursor:not-allowed}
.bf{width:100%;justify-content:center}
.bsm{padding:7px 14px;font-size:13px;border-radius:10px}
.bx{background:none;border:none;cursor:pointer;color:var(--red);font-size:16px;padding:4px;opacity:.6;transition:opacity .2s}
.bx:hover{opacity:1}

/* Upload */
.up{border:2px dashed var(--inpb);border-radius:18px;padding:26px 18px;text-align:center;
cursor:pointer;transition:all .25s;background:var(--inp);position:relative}
.up:hover,.up.drag{border-color:var(--accent);background:var(--abg)}
.up input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.th{width:68px;height:68px;object-fit:cover;border-radius:14px;border:2px solid var(--border);
cursor:pointer;transition:transform .2s}.th:hover{transform:scale(1.06)}

/* ══ MODAL ══ */
.mbg{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.4);backdrop-filter:blur(6px);
display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .15s}
.mdl{background:var(--card);border-radius:26px;padding:28px;width:100%;max-width:480px;
max-height:84vh;overflow-y:auto;box-shadow:0 20px 70px rgba(0,0,0,.18);
border:1px solid var(--border);animation:rise .3s cubic-bezier(.4,0,.2,1)}
.mdl.w{max-width:580px}
.mt{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.mx{background:var(--inp);border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;
font-size:16px;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .2s}
.mx:hover{background:var(--rbg);color:var(--red)}

/* Badge/Chip */
.bd{display:inline-block;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.3px}
.cps{display:flex;gap:7px;margin-bottom:20px;flex-wrap:wrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
.cp{padding:8px 18px;border-radius:24px;border:1.5px solid var(--bdr2);background:var(--card);
color:var(--text2);font:700 13px 'Nunito',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap}
.cp:hover{border-color:var(--accent);color:var(--text)}
.cp.on{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 3px 12px rgba(184,59,59,.25)}

/* Visit/Med */
.vc{border-left:4px solid var(--accent);border-radius:22px}
.vg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
@media(max-width:500px){.vg{grid-template-columns:1fr}}
.vl{background:var(--card2);padding:12px 14px;border-radius:12px;font-size:14px;line-height:1.45;color:var(--text)}
.vl strong{display:block;font-size:11px;color:var(--muted);margin-bottom:3px;letter-spacing:.5px;text-transform:uppercase;font-weight:800}
.ma{border-left:4px solid var(--green)}.mi{border-left:4px solid var(--border);opacity:.5}

/* Profile */
.pav{width:72px;height:72px;border-radius:50%;background:linear-gradient(140deg,#B83B3B,#D45A5A);
display:flex;align-items:center;justify-content:center;font-size:30px;color:#fff;font-weight:900;flex-shrink:0;
box-shadow:0 6px 24px rgba(184,59,59,.25)}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.pc{background:var(--card2);padding:16px 18px;border-radius:16px;border:1px solid var(--border)}
.pc small{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}

/* Chart - mobile fixed */
.cbox{width:100%;max-width:100%;height:160px;position:relative;margin:10px 0;overflow:hidden}
.cbox canvas{display:block;max-width:100%}

/* Empty */
.em{text-align:center;padding:52px 20px;animation:rise .4s ease}
.em-i{font-size:52px;margin-bottom:16px}
.em h3{font-weight:900;margin-bottom:8px;font-size:22px;color:var(--text)}
.em p{color:var(--text2);font-size:15px;margin-bottom:24px;max-width:320px;margin-left:auto;margin-right:auto;line-height:1.55}

/* Profile picker */
.pp{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:16px;margin-bottom:10px;
cursor:pointer;border:1.5px solid var(--border);background:var(--card2);transition:all .2s}
.pp:hover{border-color:var(--accent);background:var(--abg)}
.pp.sel{border:2px solid var(--accent);background:var(--abg)}

/* Activity */
.ai{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:16px;
background:var(--card2);margin-bottom:8px;border:1px solid var(--border);cursor:pointer;transition:all .2s}
.ai:hover{background:var(--abg);border-color:var(--accent);transform:translateX(3px)}

/* Section */
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.stl{font-size:24px;font-weight:900;letter-spacing:-.3px;display:flex;align-items:center;gap:10px;color:var(--text)}

/* Welcome */
.wl{margin-bottom:30px;animation:rise .4s ease}
.wl h2{font-size:32px;font-weight:900;letter-spacing:-1px;line-height:1.15;color:var(--text)}
.wl p{color:var(--text2);font-size:16px;margin-top:6px;font-weight:500}

/* Entry row */
.er{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;
border-radius:14px;background:var(--card);margin-bottom:6px;border:1px solid var(--border);
font-size:14px;transition:all .15s;color:var(--text)}
.er:hover{background:var(--card2)}
.mn-f{font-family:'DM Mono',monospace;font-size:12px}
@media(max-width:500px){
.er{flex-wrap:wrap;gap:6px;justify-content:flex-start}
.er>span:first-child{width:100%;font-size:13px}
.er>div{width:100%}
.vg{grid-template-columns:1fr}
.fl input[type=date],.fl input[type=number],.fl select{font-size:14px;padding:10px 12px}
.sg-v{font-size:28px}
.wl h2{font-size:24px}
.stl{font-size:20px}
.cd{padding:18px 16px}
}

/* Lightbox */
.lb{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);
display:flex;align-items:center;justify-content:center;padding:20px;cursor:pointer;animation:fadeIn .15s}
.lb img{max-width:92vw;max-height:88vh;border-radius:18px;box-shadow:0 16px 60px rgba(0,0,0,.4)}

/* Section label */
.sl{font-size:12px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.9px;margin-bottom:12px}

/* Graph info */
.gi{padding:12px 16px;border-radius:14px;font-size:13px;font-weight:600;line-height:1.55;margin-top:10px}

/* Modal */
.mt h3{font-size:22px;font-weight:900;letter-spacing:-.3px;color:var(--text)}

/* Stagger animation for children */
.stagger>*{animation:rise .35s ease both}
.stagger>*:nth-child(1){animation-delay:.05s}
.stagger>*:nth-child(2){animation-delay:.1s}
.stagger>*:nth-child(3){animation-delay:.15s}
.stagger>*:nth-child(4){animation-delay:.2s}
.stagger>*:nth-child(5){animation-delay:.25s}

/* Organic decorative circle on cards */
.org::after{content:'';position:absolute;width:80px;height:80px;border-radius:50%;
background:var(--accent);opacity:.04;right:-20px;bottom:-20px;pointer-events:none}

/* ══ LOCK SCREEN ══ */
.lock{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;z-index:1}
.lock-box{background:var(--card);border-radius:28px;padding:36px 32px;width:100%;max-width:380px;
box-shadow:var(--shadow);border:1px solid var(--border);text-align:center;animation:rise .4s ease}
.lock-logo{width:64px;height:64px;border-radius:50%;background:linear-gradient(140deg,#B83B3B,#D45A5A);
display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px;
box-shadow:0 6px 24px rgba(184,59,59,.25)}
.lock-box h2{font-size:24px;font-weight:900;margin-bottom:4px;color:var(--text)}
.lock-box p{font-size:14px;color:var(--text2);margin-bottom:24px}
.role-cards{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.role-card{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:16px;
border:2px solid var(--border);background:var(--card2);cursor:pointer;transition:all .25s;text-align:left}
.role-card:hover{border-color:var(--accent);background:var(--abg);transform:translateY(-1px)}
.role-card.sel{border-color:var(--accent);background:var(--abg)}
.role-icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.role-card h4{font-size:16px;font-weight:800;color:var(--text);margin-bottom:2px}
.role-card span{font-size:13px;color:var(--text2)}
.pin-input{display:flex;gap:8px;justify-content:center;margin:16px 0}
.pin-input input{width:48px;height:56px;border-radius:14px;border:2px solid var(--inpb);background:var(--inp);
color:var(--text);font:800 22px 'DM Mono',monospace;text-align:center;outline:none;transition:all .2s}
.pin-input input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--abg)}
.pin-error{color:var(--red);font-size:13px;font-weight:700;margin-top:8px;min-height:20px}
.lock-footer{margin-top:20px;font-size:12px;color:var(--muted)}

/* Role badge in sidebar */
.role-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;
letter-spacing:.4px;text-transform:uppercase;margin-left:6px}
.logout-btn{width:100%;margin-top:8px;padding:9px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.06);
background:rgba(255,255,255,.03);cursor:pointer;color:rgba(255,255,255,.4);font:600 12px 'Nunito',sans-serif;
transition:all .2s;text-align:center}
.logout-btn:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.6)}

/* Role-based visibility */
body.role-doctor .bx,body.role-patient .bx{display:none!important}
body.role-patient .add-visit-btn{display:none!important}
body.role-doctor .manage-only,body.role-patient .manage-only{display:none!important}

/* Offline indicator */
.offline-bar{position:fixed;bottom:0;left:0;right:0;background:#B83B3B;color:#fff;text-align:center;
padding:8px;font-size:13px;font-weight:700;z-index:9999;transform:translateY(100%);transition:transform .3s}
.offline-bar.show{transform:translateY(0)}

/* ══ OCR SCANNER ══ */
.ocr-preview{width:100%;max-height:240px;object-fit:contain;border-radius:14px;border:2px solid var(--border);margin:10px 0}
.ocr-progress{margin:16px 0;text-align:center}
.ocr-bar{width:100%;height:8px;border-radius:4px;background:var(--inp);overflow:hidden;margin:8px 0}
.ocr-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s;width:0%}
.ocr-status{font-size:13px;color:var(--text2);font-weight:600}

// Convert PDF file to array of page images (for OCR)
async function pdfToImages(file, onProgress){
const buf=await file.arrayBuffer();
const pdf=await pdfjsLib.getDocument({data:buf}).promise;
const imgs=[];
for(let i=1;i<=pdf.numPages;i++){
if(onProgress)onProgress("Rendering page "+i+" of "+pdf.numPages+"...");
const page=await pdf.getPage(i);
const vp=page.getViewport({scale:2.5}); // High scale for better OCR
const canvas=document.createElement('canvas');
canvas.width=vp.width;canvas.height=vp.height;
await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
imgs.push(canvas.toDataURL('image/png'));
}
return imgs;
}

function drawNutChart(cv,pts,color,unit){
if(!cv||!pts.length)return;
const box=cv.parentElement;if(!box)return;
const rect=box.getBoundingClientRect();
const W=Math.min(rect.width,window.innerWidth-32);const H=rect.height||155;
if(W<50)return;
const ctx=cv.getContext("2d"),dpr=window.devicePixelRatio||1;
cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+"px";cv.style.height=H+"px";ctx.scale(dpr,dpr);
const p={t:14,r:12,b:26,l:44},gw=W-p.l-p.r,gh=H-p.t-p.b;
const vs=pts.map(d=>d.v);
let mn=0,mx=Math.max(...vs)*1.2;if(mx===0)mx=100;
const xS=pts.length>1?gw/(pts.length-1):gw/2;
const yS=v=>p.t+gh-(((v-mn)/(mx-mn))*gh),xP=i=>p.l+(pts.length>1?i*xS:gw/2);

// Grid
ctx.strokeStyle=dk?"rgba(255,255,255,.04)":"rgba(0,0,0,.04)";ctx.lineWidth=.5;
for(let i=0;i<5;i++){const y=p.t+gh*(i/4);ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(p.l+gw,y);ctx.stroke()}

// Area + Line
if(pts.length>1){
const gr=ctx.createLinearGradient(0,p.t,0,p.t+gh);gr.addColorStop(0,color+"35");gr.addColorStop(1,color+"05");
ctx.beginPath();ctx.moveTo(xP(0),yS(pts[0].v));
for(let i=1;i<pts.length;i++){const x0=xP(i-1),y0=yS(pts[i-1].v),x1=xP(i),y1=yS(pts[i].v),cx=(x0+x1)/2;ctx.bezierCurveTo(cx,y0,cx,y1,x1,y1)}
ctx.lineTo(xP(pts.length-1),p.t+gh);ctx.lineTo(xP(0),p.t+gh);ctx.closePath();ctx.fillStyle=gr;ctx.fill();
ctx.beginPath();ctx.moveTo(xP(0),yS(pts[0].v));
for(let i=1;i<pts.length;i++){const x0=xP(i-1),y0=yS(pts[i-1].v),x1=xP(i),y1=yS(pts[i].v),cx=(x0+x1)/2;ctx.bezierCurveTo(cx,y0,cx,y1,x1,y1)}
ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineCap="round";ctx.stroke();
}

// Dots
pts.forEach((d,i)=>{const x=xP(i),y=yS(d.v);
ctx.beginPath();ctx.arc(x,y,4.5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fillStyle=dk?"#1A2D28":"#fff";ctx.fill();
});

// X labels
ctx.fillStyle=dk?"rgba(255,255,255,.3)":"rgba(0,0,0,.3)";ctx.font="500 9px Nunito,sans-serif";ctx.textAlign="center";
pts.forEach((d,i)=>{if(pts.length<=10||i%Math.ceil(pts.length/6)===0||i===pts.length-1)ctx.fillText(d.label,xP(i),H-4)});
// Y labels
ctx.textAlign="right";
for(let i=0;i<5;i++){const v=mn+(mx-mn)*(1-i/4);ctx.fillText(Math.round(v),p.l-5,p.t+gh*(i/4)+3)}
}

const MEAL_PROMPT=`You are a nutrition and food analysis expert.
Analyze the uploaded meal image carefully.
For EACH food item visible, estimate:
1. Food name
2. Quantity in grams
3. Cooking method
4. Estimated calories
5. Estimated carbohydrates (g)
6. Estimated protein (g)
7. Estimated fat (g)
8. Estimated fiber (g)
9. Liver friendliness score (1-10)
10. Health remarks

Also calculate:
- Total meal calories, total carbohydrates, total protein, total fat, total fiber

Provide meal timing recommendation and liver-friendly recommendations.

Return ONLY valid JSON. Format:
{"foods":[{"name":"","quantity_g":0,"cooking_method":"","calories":0,"carbohydrates_g":0,"protein_g":0,"fat_g":0,"fiber_g":0,"liver_friendliness_score":0,"remarks":""}],"meal_summary":{"total_calories":0,"total_carbohydrates_g":0,"total_protein_g":0,"total_fat_g":0,"total_fiber_g":0},"meal_timing_recommendation":"","liver_recommendations":[""]}
Do not include markdown. Do not include explanations. Return JSON only.`;

const GEMINI_MODELS=["gemini-2.5-flash","gemini-2.0-flash","gemini-1.5-flash"];

async function callGemini(apiKey,imageBase64,onStatus){
const mimeMatch=imageBase64.match(/data:([^;]+);/);
const mimeType=mimeMatch?mimeMatch[1]:"image/jpeg";
const b64Data=imageBase64.split(",")[1];
const body=JSON.stringify({
contents:[{parts:[{text:MEAL_PROMPT},{inline_data:{mime_type:mimeType,data:b64Data}}]}],
generationConfig:{temperature:0.3}
});

for(let mi=0;mi<GEMINI_MODELS.length;mi++){
const model=GEMINI_MODELS[mi];
for(let attempt=0;attempt<2;attempt++){
if(onStatus)onStatus("Trying "+model+(attempt>0?" (retry "+(attempt)+")":"")+"...");
try{
const resp=await fetch("https://generativelanguage.googleapis.com/v1beta/models/"+model+":generateContent?key="+apiKey,{
method:"POST",headers:{"Content-Type":"application/json"},body
});
if(resp.status===503||resp.status===429){
// Model busy, wait then try next
if(onStatus)onStatus(model+" is busy, waiting...");
await new Promise(r=>setTimeout(r,2000*(attempt+1)));
continue;
}
if(!resp.ok){const err=await resp.text();throw new Error("API Error "+resp.status+": "+err)}
const data=await resp.json();
const text=data.candidates?.[0]?.content?.parts?.[0]?.text||"";
const clean=text.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();
const result=JSON.parse(clean);
result._model=model;
return result;
}catch(e){
if(e.message?.includes("API Error"))throw e;
if(attempt===1&&mi<GEMINI_MODELS.length-1)break; // try next model
if(attempt===1&&mi===GEMINI_MODELS.length-1)throw e;
await new Promise(r=>setTimeout(r,1500));
}
}
}
throw new Error("All Gemini models are currently busy. Please try again in a minute.");
}

// ═══ GOOGLE HEALTH API (replaces Fitbit Web API) ═══
const GHEALTH_API="https://health.googleapis.com/v4/users/me/dataTypes";
const GHEALTH_SCOPES="https://www.googleapis.com/auth/googlehealth.activity_and_fitness https://www.googleapis.com/auth/googlehealth.health_metrics_and_measurements https://www.googleapis.com/auth/googlehealth.sleep";

function getGHealthToken(){return localStorage.getItem("liver_ghealth_token")}
function getGHealthClientId(){return localStorage.getItem("liver_ghealth_cid")||""}
function getGHealthLastSync(){return localStorage.getItem("liver_ghealth_sync")||""}

function connectGHealth(){
const clientId=getGHealthClientId();
if(!clientId){alert("Please set your Google Cloud Client ID first");return}
const redirect=window.location.href.split("#")[0].split("?")[0];
const url="https://accounts.google.com/o/oauth2/v2/auth"
+"?client_id="+encodeURIComponent(clientId)
+"&redirect_uri="+encodeURIComponent(redirect)
+"&response_type=token"
+"&scope="+encodeURIComponent(GHEALTH_SCOPES)
+"&include_granted_scopes=true"
+"&prompt=consent";
window.location.href=url;
}

// Check URL for Google OAuth callback token
function checkGHealthCallback(){
if(window.location.hash.includes("access_token")){
const params=new URLSearchParams(window.location.hash.substring(1));
const token=params.get("access_token");
if(token){
localStorage.setItem("liver_ghealth_token",token);
history.replaceState(null,"",window.location.pathname);
console.log("Google Health API connected");
}
}
}
checkGHealthCallback();

// Date helpers
function ghFetch(endpoint){
const token=getGHealthToken();
if(!token)throw new Error("Not connected");
const resp=await fetch(endpoint,{headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"}});
if(resp.status===401){localStorage.removeItem("liver_ghealth_token");throw new Error("Session expired. Please reconnect.")}
if(!resp.ok){const txt=await resp.text();throw new Error("API error "+resp.status+": "+txt.slice(0,200))}
return resp.json();
}

async function syncHealthData(p){
const results={};
const now=new Date();
const weekAgo=new Date(now);weekAgo.setDate(weekAgo.getDate()-7);
const startFilter=weekAgo.toISOString().split(".")[0]+"Z";

try{
const fetches=await Promise.allSettled([
ghFetch(GHEALTH_API+"/steps/dataPoints?filter="+encodeURIComponent('steps.interval.start_time.physical_time >= "'+startFilter+'"')+"&pageSize=500"),
ghFetch(GHEALTH_API+"/daily-resting-heart-rate/dataPoints?filter="+encodeURIComponent('daily_resting_heart_rate.sample_time.physical_time >= "'+startFilter+'"')+"&pageSize=50"),
ghFetch(GHEALTH_API+"/sleep/dataPoints?filter="+encodeURIComponent('sleep.overall.start_time.physical_time >= "'+startFilter+'"')+"&pageSize=20"),
ghFetch(GHEALTH_API+"/daily-oxygen-saturation/dataPoints?filter="+encodeURIComponent('daily_oxygen_saturation.sample_time.physical_time >= "'+startFilter+'"')+"&pageSize=20")
]);

// Parse steps (aggregate by day)
if(fetches[0].status==="fulfilled"&&fetches[0].value?.dataPoints){
const byDay={};
fetches[0].value.dataPoints.forEach(dp=>{
const d=dp.steps?.interval?.civilStartTime?.date;
if(d){
const ds=d.year+"-"+String(d.month).padStart(2,"0")+"-"+String(d.day).padStart(2,"0");
byDay[ds]=(byDay[ds]||0)+parseInt(dp.steps?.count||0);
}
});
results.steps=Object.entries(byDay).map(([date,value])=>({date,value})).sort((a,b)=>a.date.localeCompare(b.date));
}

// Parse resting heart rate
if(fetches[1].status==="fulfilled"&&fetches[1].value?.dataPoints){
results.heart=fetches[1].value.dataPoints.map(dp=>{
const t=dp.dailyRestingHeartRate?.sampleTime?.civilTime?.date;
const date=t?(t.year+"-"+String(t.month).padStart(2,"0")+"-"+String(t.day).padStart(2,"0")):"";
return{date,value:dp.dailyRestingHeartRate?.beatsPerMinute||0};
}).filter(d=>d.date&&d.value).sort((a,b)=>a.date.localeCompare(b.date));
}

// Parse sleep
if(fetches[2].status==="fulfilled"&&fetches[2].value?.dataPoints){
results.sleep=fetches[2].value.dataPoints.map(dp=>{
const s=dp.sleep;if(!s)return null;
const startDate=s.overall?.startTime?.civilTime?.date;
const date=startDate?(startDate.year+"-"+String(startDate.month).padStart(2,"0")+"-"+String(startDate.day).padStart(2,"0")):"";
const minAsleep=parseInt(s.summary?.minutesAsleep||0);
return{date,durationMs:minAsleep*60000,efficiency:s.summary?.minutesAsleep&&s.summary?.minutesInSleepPeriod?Math.round(parseInt(s.summary.minutesAsleep)/parseInt(s.summary.minutesInSleepPeriod)*100):null};
}).filter(d=>d&&d.date).sort((a,b)=>a.date.localeCompare(b.date));
}

// Parse SpO2
if(fetches[3].status==="fulfilled"&&fetches[3].value?.dataPoints){
const spo2Pts=fetches[3].value.dataPoints;
if(spo2Pts.length){
const avg=spo2Pts.reduce((s,d)=>s+(d.dailyOxygenSaturation?.averagePercentage||0),0)/spo2Pts.length;
results.spo2={avg:Math.round(avg*10)/10};
}
}

results.synced=new Date().toISOString();
results.errors=fetches.filter(f=>f.status==="rejected").map(f=>f.reason?.message).filter(Boolean);
p.fitbit=results;
localStorage.setItem("liver_ghealth_sync",new Date().toLocaleString());
sv();
return results;
}catch(e){throw e}
}

const NOTIF_KEY="liver_notifs";
function getNotifPrefs(){try{return JSON.parse(localStorage.getItem(NOTIF_KEY))||{}}catch{return{}}}

async function requestNotifPermission(){
if(!("Notification" in window))return"unsupported";
if(Notification.permission==="granted")return"granted";
const perm=await Notification.requestPermission();

}

function sendNotification(title,body,icon){

try{new Notification(title,{body,icon:icon||"",badge:"",tag:title.slice(0,20),renotify:true})}catch(e){console.log("Notif error:",e)}

// Notification scheduler - runs every 5 minutes when app is open
function startNotifScheduler(){
const prefs=getNotifPrefs();
if(!prefs.enabled)return;

setInterval(()=>{
const now=new Date();
const hour=now.getHours();
const min=now.getMinutes();
const today=now.toISOString().split("T")[0];
const lastCheck=localStorage.getItem("liver_notif_last")||"";
const p=gp();if(!p)return;

// 7 PM step check
if(prefs.steps&&hour===19&&min<5&&lastCheck!==today+"_steps"){
const fb=p.fitbit;
if(fb?.steps?.length){
const todaySteps=fb.steps.find(s=>s.date===today);
const stepCount=parseInt(todaySteps?.value||0);
const goal=prefs.stepGoal||8000;
if(stepCount<goal){
const remaining=goal-stepCount;
sendNotification("🚶 Keep Walking!","You've walked "+stepCount.toLocaleString()+" steps today. Just "+remaining.toLocaleString()+" more to reach your "+goal.toLocaleString()+" goal. You've got this!","⌚");
}else{
sendNotification("🎉 Step Goal Achieved!","Amazing! You've walked "+stepCount.toLocaleString()+" steps today, smashing your "+goal.toLocaleString()+" goal!","⌚");
}
localStorage.setItem("liver_notif_last",today+"_steps");
}
}

// 9 PM medication reminder
if(prefs.meds&&hour===21&&min<5&&lastCheck!==today+"_meds"){
const activeMeds=(p.md||[]).filter(m=>m.on);
if(activeMeds.length){
sendNotification("💊 Medication Reminder","Don't forget your evening medications: "+activeMeds.slice(0,3).map(m=>m.nm).join(", ")+(activeMeds.length>3?" and "+(activeMeds.length-3)+" more":""),"💊");
localStorage.setItem("liver_notif_last",today+"_meds");
}
}

// 8 AM morning health tip
if(prefs.tips&&hour===8&&min<5&&lastCheck!==today+"_tips"){
const tips=["Start your day with a glass of warm water for liver health.","A 10-minute morning walk boosts your metabolism and mood.","Remember to track your breakfast in the Meal Scanner today.","Stay hydrated! Aim for 8 glasses of water today.","A balanced breakfast with protein keeps energy stable all morning.","Take a moment to breathe deeply. Your liver loves good oxygen flow."];
const tip=tips[Math.floor(Math.random()*tips.length)];
sendNotification("🌅 Good Morning Health Tip",tip,"🌅");
localStorage.setItem("liver_notif_last",today+"_tips");
}

// 2 PM hydration reminder
if(prefs.hydration&&hour===14&&min<5&&lastCheck!==today+"_water"){
sendNotification("💧 Hydration Check","Have you been drinking enough water today? Your liver needs good hydration to function well. Aim for 2-3 more glasses this afternoon.","💧");
localStorage.setItem("liver_notif_last",today+"_water");
}
},60000); // Check every minute
}

setTimeout(()=>startNotifScheduler(),3000);

// Build reverse lookup: canonical name -> {category, marker details}
function buildCatLookup(){
const at=gat(),lookup={};
Object.entries(at).forEach(([cat,markers])=>{markers.forEach(mk=>{lookup[mk.n]={cat,lo:mk.lo,hi:mk.hi}})});

// Clean raw OCR text before parsing
function cleanOCRText(raw){
let t=raw;
// Fix common OCR character misreads
t=t.replace(/[|]/g,"l"); // pipe -> l
t=t.replace(/\bO(\d)/g,"0$1"); // O before digit -> 0
t=t.replace(/(\d)O/g,"$10"); // digit then O -> digit then 0
t=t.replace(/(\d)\s*,\s*(\d)/g,"$1.$2"); // comma between digits -> decimal
t=t.replace(/(\d)\s*[;:]\s*(\d)/g,"$1.$2"); // semicolon/colon between digits -> decimal
t=t.replace(/(\d)\s*[`']\s*(\d)/g,"$1.$2"); // backtick/apostrophe between digits
t=t.replace(/(\d)\s*[oO]\s*(\d)/g,"$1.0$2"); // letter o between digits
return t;
}

// Try to recover the correct decimal placement using reference range
function fixDecimal(rawVal, lo, hi){
const v=parseFloat(rawVal);
if(isNaN(v))return null;

// If already in a reasonable range (within 0.1x to 10x of expected), keep it
const rMid=(lo+hi)/2;
const rSpan=hi-lo;
if(v>=lo*0.1 && v<=hi*10) {
// Check if it's in the actual range or close to it
if(v>=lo*0.5 && v<=hi*2) return String(v);
}

// Value seems wrong - try inserting decimal points
const s=String(rawVal).replace(/[^0-9]/g,"");
if(s.length<2) return String(v);

const candidates=[];
for(let i=1;i<s.length;i++){
const attempt=s.slice(0,i)+"."+s.slice(i);
const av=parseFloat(attempt);
if(!isNaN(av)){
// Score: how close is this to the expected range?
const dist=av>=lo&&av<=hi?0:Math.min(Math.abs(av-lo),Math.abs(av-hi));
candidates.push({val:av,str:attempt,dist,inRange:av>=lo*0.5&&av<=hi*2});
}
}

// Also try the original value
const origDist=v>=lo&&v<=hi?0:Math.min(Math.abs(v-lo),Math.abs(v-hi));
candidates.push({val:v,str:String(v),dist:origDist,inRange:v>=lo*0.5&&v<=hi*2});

// Prefer values that are in/near range
const inRange=candidates.filter(c=>c.inRange);
if(inRange.length){
inRange.sort((a,b)=>a.dist-b.dist);
return inRange[0].str;
}

// Nothing in range - return the candidate closest to range
candidates.sort((a,b)=>a.dist-b.dist);
return candidates[0]?.str||String(v);
}

// Parse OCR text and extract values
function parseOCRText(rawText){
const cleaned=cleanOCRText(rawText);
const lines=cleaned.split("\n").map(l=>l.trim()).filter(l=>l.length>2);
const found=[];
const aliasKeys=Object.keys(OCR_ALIASES).sort((a,b)=>b.length-a.length);
const catLookup=buildCatLookup();

lines.forEach(line=>{
const lower=line.toLowerCase().replace(/[:|]/g," ").replace(/\s+/g," ");
aliasKeys.forEach(alias=>{
if(lower.includes(alias)){
const canonical=OCR_ALIASES[alias];
if(found.some(f=>f.name===canonical))return;
// Find all number-like patterns (including those with commas, spaces in them)
const nums=line.match(/\d[\d\s,.']*\d|\d+\.?\d*/g);
if(nums&&nums.length>0){
// Clean each candidate
const cleanNums=nums.map(n=>n.replace(/\s/g,"").replace(/,/g,".")).filter(n=>{
const v=parseFloat(n);return!isNaN(v)&&v>0&&v<1000000;
});
if(cleanNums.length>0){
let bestVal=cleanNums[0];
// If we know the range, fix decimal
const info=catLookup[canonical];
if(info){
bestVal=fixDecimal(cleanNums[0],info.lo,info.hi)||cleanNums[0];
// Also check other numbers on the line in case the first one is wrong
for(let i=1;i<Math.min(cleanNums.length,3);i++){
const alt=fixDecimal(cleanNums[i],info.lo,info.hi);
if(alt){
const bv=parseFloat(bestVal),av=parseFloat(alt);
const bDist=bv>=info.lo&&bv<=info.hi?0:Math.min(Math.abs(bv-info.lo),Math.abs(bv-info.hi));
const aDist=av>=info.lo&&av<=info.hi?0:Math.min(Math.abs(av-info.lo),Math.abs(av-info.hi));
if(aDist<bDist)bestVal=alt;
}
}
}
const fv=parseFloat(bestVal);
// Flag if still out of range
const warn=info&&(fv<info.lo*0.2||fv>info.hi*5);
found.push({name:canonical,value:bestVal,line:line.trim(),warn});
}
}
}
});
});
return found;
}
